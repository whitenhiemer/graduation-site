<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Woodward &mdash; Through the Years</title>
    <style>
        :root {
            --navy:  #0d1520;
            --gold:  #c9a227;
            --gold2: #e2b83a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

        body {
            background: var(--navy);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── star field background ─────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(rgba(201,162,39,0.08) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px, 22px 22px;
            background-position: 0 0, 11px 11px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── header ──────────────────────────────────────────── */
        .site-header {
            position: relative;
            z-index: 10;
            padding: 52px 32px 36px;
            text-align: center;
            border-bottom: 1px solid rgba(201,162,39,0.15);
        }

        .back-link {
            display: inline-block;
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(201,162,39,0.6);
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--gold); }
        .back-link::before { content: '\2190  '; }

        .header-title {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: clamp(2rem, 6vw, 3.8rem);
            font-weight: 400;
            color: #fff;
            line-height: 1.1;
        }

        .header-rule {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 18px auto;
            max-width: 300px;
        }
        .h-line { flex: 1; height: 1px; background: rgba(201,162,39,0.35); }
        .h-diamond { color: var(--gold); font-size: 0.6rem; }

        .header-sub {
            font-family: Georgia, serif;
            font-style: italic;
            font-size: clamp(0.85rem, 2vw, 1rem);
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.04em;
        }

        /* ── download button ─────────────────────────────────── */
        .poster-cta {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 28px 0 0;
        }
        .poster-btn {
            display: inline-block;
            padding: 11px 28px;
            border: 1.5px solid rgba(201,162,39,0.5);
            border-radius: 100px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            text-decoration: none;
            transition: all 0.2s;
        }
        .poster-btn:hover {
            background: rgba(201,162,39,0.12);
            border-color: var(--gold);
        }

        /* ── masonry grid ────────────────────────────────────── */
        .collage-grid {
            position: relative;
            z-index: 5;
            columns: 4;
            column-gap: 18px;
            padding: 40px 36px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── polaroid card ───────────────────────────────────── */
        .photo-card {
            display: inline-block;
            width: 100%;
            break-inside: avoid;
            margin-bottom: 18px;
            background: #fff;
            padding: 10px 10px 38px;
            border-radius: 2px;
            box-shadow:
                0 6px 24px rgba(0,0,0,0.45),
                0 2px 6px rgba(0,0,0,0.25);
            transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94),
                        box-shadow 0.35s ease;
            cursor: pointer;
        }

        .photo-card img {
            width: 100%;
            display: block;
            border-radius: 1px;
            object-fit: cover;
        }

        .photo-card figcaption {
            text-align: center;
            font-family: -apple-system, sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #888;
            margin-top: 10px;
            line-height: 1;
        }

        /* random rotations via nth-child */
        .photo-card:nth-child(7n+1) { transform: rotate(-2.6deg); }
        .photo-card:nth-child(7n+2) { transform: rotate(1.9deg);  }
        .photo-card:nth-child(7n+3) { transform: rotate(-3.2deg); }
        .photo-card:nth-child(7n+4) { transform: rotate(2.4deg);  }
        .photo-card:nth-child(7n+5) { transform: rotate(-1.5deg); }
        .photo-card:nth-child(7n+6) { transform: rotate(3.0deg);  }
        .photo-card:nth-child(7n+7) { transform: rotate(-2.1deg); }

        .photo-card:hover {
            transform: rotate(0deg) scale(1.04) translateY(-6px) !important;
            box-shadow:
                0 18px 48px rgba(0,0,0,0.55),
                0 0 0 2px rgba(201,162,39,0.6);
            z-index: 100;
            position: relative;
        }

        /* ── year divider label ──────────────────────────────── */
        .year-divider {
            display: inline-block;
            width: 100%;
            break-inside: avoid;
            margin-bottom: 14px;
            text-align: center;
            padding: 8px 0;
        }

        .year-divider span {
            font-family: Georgia, serif;
            font-size: 0.85rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(201,162,39,0.55);
            position: relative;
        }

        /* ── lightbox ────────────────────────────────────────── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.92);
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: 90vw;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 2px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.7);
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 28px;
            font-size: 2rem;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            transition: color 0.2s;
        }
        .lightbox-close:hover { color: var(--gold); }

        /* ── footer ──────────────────────────────────────────── */
        .site-footer {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 40px 24px 52px;
            border-top: 1px solid rgba(201,162,39,0.1);
        }

        .footer-text {
            font-family: Georgia, serif;
            font-style: italic;
            color: rgba(255,255,255,0.3);
            font-size: 0.875rem;
            letter-spacing: 0.04em;
        }

        /* ── responsive ──────────────────────────────────────── */
        @media (max-width: 1100px) { .collage-grid { columns: 3; } }
        @media (max-width: 720px)  { .collage-grid { columns: 2; column-gap: 12px; padding: 28px 20px 48px; } }
        @media (max-width: 420px)  { .collage-grid { columns: 1; } }
    </style>

    <script>
        var cards = document.querySelectorAll('.photo-card[data-src]');
        var lb = document.getElementById('lightbox');
        var lbImg = document.getElementById('lb-img');

        cards.forEach(function(card) {
            card.addEventListener('click', function() {
                lbImg.src = card.getAttribute('data-src');
                lb.classList.add('open');
                document.body.style.overflow = 'hidden';
            });
        });

        function closeLb() {
            lb.classList.remove('open');
            lbImg.src = '';
            document.body.style.overflow = '';
        }

        document.getElementById('lb-close').addEventListener('click', closeLb);
        lb.addEventListener('click', function(e) { if (e.target === lb) closeLb(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLb(); });
    </script>
